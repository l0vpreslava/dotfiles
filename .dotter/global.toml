[helpers]

[default]
depends = ["emacs", "git", "fish", "eza", "zoxide", "starship", "rustup"]

[default.files]

[default.variables]

[termux.files]
"termux/colors.properties" = "~/.termux/colors.properties"
"termux/X11" = { target = "~/.shortcuts/tasks/X11", type = "template" }
"termux/Jupyter" = { target = "~/.shortcuts/tasks/Jupyter", type = "template" }
"termux/Shut" = { target = "~/.shortcuts/Shutdown all", type = "template" }

[emacs.files]	
"emacs/init.el" = "~/.emacs.d/init.el"

[git.files]
"git/.gitconfig" = "~/.gitconfig"

[starship.files]
"starship/config.toml" = "~/.config/starship/config.toml"
"fish/conf.d/starship.fish" = "~/.config/fish/conf.d/starship.fish"

[wezterm.files]
"wezterm/wezterm.lua" = "~/.config/wezterm/wezterm.lua"

[fish.files]
"fish/config.fish" = "~/.config/fish/config.fish"

[eza.files]
"fish/conf.d/eza.fish" = "~/.config/fish/conf.d/eza.fish"

[zoxide.files]
"fish/conf.d/zoxide.fish" = "~/.config/fish/conf.d/zoxide.fish"

[rustup.files]
"fish/conf.d/rustup.fish" = "~/.config/fish/conf.d/rustup.fish"


[settings]
default_target_type = "automatic"
