[helpers]

[default]
depends = ["emacs", "git"]

[default.files]

[default.variables]

[termux.files]
"termux/colors.properties" = "~/.termux/colors.properties"
"termux/X11" = { target = "~/.shortcuts/tasks/X11", type = "template" }
"termux/Jupyter" = { target = "~/.shortcuts/tasks/Jupyter", type = "template" }
"termux/Shut" = { target = "~/.shortcuts/Shutdown all", type = "template" }

[emacs.files]	
"emacs/init.el" = "~/.emacs.d/init.el"

[git.files]
"git/.gitconfig" = "~/.gitconfig"

[starship.files]
"starship/config.toml" = "~/.config/starship/config.toml"

[settings]
default_target_type = "automatic"
